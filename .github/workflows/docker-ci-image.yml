name: Docker CI Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - "docker/Dockerfile"
      - ".github/workflows/docker-ci-image.yml"
  pull_request:
    paths:
      - "docker/Dockerfile"
      - ".github/workflows/docker-ci-image.yml"
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Normalize GHCR image name
        id: image
        run: |
          echo "repo=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/cuda-pytorch-ci" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.repo }}
          tags: |
            type=raw,value=py310-cu128-nightly
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and optionally push CI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
