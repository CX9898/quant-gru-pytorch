name: Build Linux CUDA

on:
  push:
    branches:
      - main
      - master
    paths:
      - "CMakeLists.txt"
      - "include/**"
      - "src/**"
      - "example/**"
      - "pytorch/**"
      - "docker/Dockerfile"
      - ".github/workflows/build-linux-cuda.yml"
  pull_request:
    paths:
      - "CMakeLists.txt"
      - "include/**"
      - "src/**"
      - "example/**"
      - "pytorch/**"
      - "docker/Dockerfile"
      - ".github/workflows/build-linux-cuda.yml"
  workflow_dispatch:

jobs:
  build-linux-cuda:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h /
          # 删除托管 runner 上预装的大件，为 CUDA+PyTorch 镜像腾出空间
          sudo rm -rf /usr/share/dotnet \
                      /usr/local/lib/android \
                      /opt/ghc \
                      /opt/hostedtoolcache/CodeQL \
                      /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true
          echo "Disk space after cleanup:"
          df -h /

      - name: Normalize GHCR image name
        id: image
        run: |
          echo "repo=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/cuda-pytorch-ci" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull prebuilt CI image
        run: docker pull "${{ steps.image.outputs.repo }}:py310-cu128-nightly"

      - name: Configure and build native library
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            "${{ steps.image.outputs.repo }}:py310-cu128-nightly" \
            bash -lc '
              set -euxo pipefail
              rm -rf build
              mkdir -p build
              cd build
              cmake ..
              cmake --build . --parallel
              test -f ../pytorch/lib/libgru_quant_shared.so
            '

      - name: Build Python extension against prebuilt shared library
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace/pytorch \
            "${{ steps.image.outputs.repo }}:py310-cu128-nightly" \
            bash -lc '
              set -euxo pipefail
              rm -rf build dist *.egg-info
              rm -f ./*.so
              python -m pip install -e . --no-deps --no-build-isolation
              python -c "import quant_gru; print(\"Imported:\", quant_gru.__name__)"
            '

      - name: Upload native build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: native-linux-cuda-artifacts
          path: |
            build/gru_example
            pytorch/lib/libgru_quant_shared.so
          if-no-files-found: error
